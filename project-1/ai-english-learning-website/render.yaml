# render.yaml - Render service configuration for AI English Learning Backend
services:
  - type: web
    name: ai-english-learning-backend
    env: docker
    plan: free
    # Render will build the Dockerfile in the repository root
    dockerfilePath: ./backend/Dockerfile
    # The service will listen on the port provided by Render via $PORT
    # No explicit start command needed; Dockerfile's ENTRYPOINT runs the app.
    healthCheckPath: /api/health
    # Environment variables (add secrets in Render dashboard as needed)
