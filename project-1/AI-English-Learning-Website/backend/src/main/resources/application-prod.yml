server:
  port: ${PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: ai-english-learning-backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

seed:
  admin:
    enabled: ${SEED_ADMIN:false}
    email: ${ADMIN_EMAIL:}
    password: ${ADMIN_PASSWORD:}
    name: ${ADMIN_NAME:Admin User}

logging:
  level:
    root: INFO
    org.springframework: WARN
    org.hibernate: WARN
